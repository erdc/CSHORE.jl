name = "CSHORE"
uuid = "a1c92f1e-4d5b-4a7e-9f8c-2b3c4d5e6f70"
version = "0.1.0-dev"
authors = ["N. Cohn (US Army Engineer Research and Development Center, Coastal and Hydraulics Laboratory)"]

# CairoMakie / HTTP / JSON3 / CSV / DataFrames are weak deps: CairoMakie
# powers the optional plotting extension (CSHOREMakieExt) and the latter
# four power the optional environmental-data-fetching extension
# (CSHOREDataExt, NDBC / NOAA CO-OPS). Add them to your environment to
# enable those features.

[deps]
BasicModelInterface = "59605e27-edc0-445a-b93d-c09a3a50b330"
Dates = "ade2ca70-3891-5945-98fb-dc099432e06a"
FFTW = "7a1cc6ca-52ef-59f5-83cd-3a7055c09341"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
MAT = "23992714-dd62-5051-b70f-ba57cb901cac"
NCDatasets = "85f8d34a-cbdd-5861-8df4-14fed0d494ab"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
SpecialFunctions = "276daf66-3868-5448-9aa4-cd146d93841b"
Statistics = "10745b16-79ce-11e8-11f9-7d13ad32a3b2"
TOML = "fa267f1f-6049-4f14-aa54-33bafae1ed76"

[weakdeps]
CSV = "336ed68f-0bac-5ca0-87d4-7b16caf5d00b"
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
DataFrames = "a93c6f00-e57d-5684-b7b6-d8193f3e46c0"
HTTP = "cd3eb016-35fb-5094-929b-558a96fad6f3"
JSON3 = "0f8b85d8-7281-11e9-16c2-39a750bddbf1"

[extensions]
# Plotting via CairoMakie (src/plotting.jl stubs)
CSHOREMakieExt = "CairoMakie"
# Environmental data fetching (NDBC, NOAA CO-OPS) via src/data.jl stubs
CSHOREDataExt  = ["HTTP", "JSON3", "CSV", "DataFrames"]

[compat]
BasicModelInterface = "0.1.1"
CSV = "0.10"
CairoMakie = "0.15.9"
DataFrames = "1"
FFTW = "1.10.0"
HTTP = "1"
JSON3 = "1"
MAT = "0.12.0"
NCDatasets = "0.14.15"
SpecialFunctions = "2"
julia = "1.10"

[extras]
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
CSV = "336ed68f-0bac-5ca0-87d4-7b16caf5d00b"
DataFrames = "a93c6f00-e57d-5684-b7b6-d8193f3e46c0"
HTTP = "cd3eb016-35fb-5094-929b-558a96fad6f3"
JSON3 = "0f8b85d8-7281-11e9-16c2-39a750bddbf1"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test", "CairoMakie", "CSV", "DataFrames", "HTTP", "JSON3"]
